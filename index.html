<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>cutcutcut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Jost:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── DARK MODE (기본) ── */
:root {
  --bg:       #0c0a09;
  --bg2:      #131009;
  --bg3:      #1a1610;
  --surface:  #201c14;
  --border:   #2c2619;
  --cut:      #ff5c35;
  --cut2:     #ff8b5e;
  --cut-glow: rgba(255,92,53,0.13);
  --gold:     #ffd166;
  --text:     #f2ebe0;
  --dim:      #8a7e6f;
  --muted:    #3d3628;
  --green:    #4ade80;
}

/* ── LIGHT MODE ── */
body.light {
  --bg:       #faf8f4;
  --bg2:      #f2ebe0;
  --bg3:      #e8dfd0;
  --surface:  #ede4d4;
  --border:   #d4c9b4;
  --cut:      #e8441e;
  --cut2:     #ff6840;
  --cut-glow: rgba(232,68,30,0.09);
  --gold:     #b45309;
  --text:     #1a1208;
  --dim:      #6b5e4a;
  --muted:    #c0b49e;
  --green:    #16a34a;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.03;
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ── */
header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  animation: fadeDown 0.6s ease both;
  transition: border-color 0.3s;
}

@keyframes fadeDown {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}

.logo-block { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
  color: var(--text);
  line-height: 1;
  display: flex;
  align-items: center;
  transition: color 0.3s;
}

.cut-mark {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--cut);
  border-radius: 50%;
  margin-left: 3px;
  margin-bottom: 14px;
  animation: blink 2.8s ease-in-out infinite;
}

@keyframes blink {
  0%,80%,100% { opacity:1; }
  90% { opacity:0.2; }
}

.greeting {
  font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif;
  font-size: 14.5px;
  color: var(--text);
  opacity: 0.72;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
  transition: color 0.3s, opacity 0.3s;
  letter-spacing: 0.2px;
}

/* 헤더 오른쪽 */
.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.icon-btn {
  width: 38px; height: 38px;
  border-radius: 9px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  cursor: pointer;
  font-size: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
  position: relative;
}
.icon-btn:hover { border-color: var(--cut); transform: scale(1.05); }
.icon-btn.on {
  background: var(--cut-glow);
  border-color: var(--cut);
}

/* 툴팁 */
.icon-btn::after {
  content: attr(data-tip);
  position: absolute;
  bottom: -30px; left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  font-family: 'Jost', sans-serif;
  font-size: 10px; font-weight: 600;
  white-space: nowrap;
  padding: 3px 7px;
  border-radius: 4px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
}
.icon-btn:hover::after { opacity: 1; }

.div-v {
  width: 1px; height: 24px;
  background: var(--border);
  margin: 0 2px;
}

.new-file-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  color: var(--dim);
  font-family: 'Jost', sans-serif;
  font-size: 12px; font-weight: 500;
  padding: 8px 13px;
  cursor: pointer;
  transition: all 0.18s;
  display: none;
  white-space: nowrap;
}
.new-file-btn:hover { border-color: var(--cut); color: var(--cut); }

/* ── MAIN ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 20px 32px;
  gap: 20px;
  max-width: 700px;
  width: 100%;
  margin: 0 auto;
}

/* ── UPLOAD ── */
#upload-zone {
  width: 100%;
  border: 1.5px dashed var(--border);
  border-radius: 20px;
  padding: 56px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.22s;
  background: var(--bg2);
  animation: fadeUp 0.5s ease 0.1s both;
  position: relative;
  overflow: hidden;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

#upload-zone::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,92,53,0.06) 0%, transparent 70%);
  pointer-events: none;
}
#upload-zone:hover, #upload-zone.drag-over {
  border-color: var(--cut);
  background: var(--bg3);
}
#upload-zone input { display: none; }

.upload-scissors {
  font-size: 38px;
  transition: transform 0.3s;
}
#upload-zone:hover .upload-scissors { transform: rotate(-8deg) scale(1.1); }

.upload-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--text);
}
.upload-desc {
  font-size: 13px;
  color: var(--dim);
  text-align: center;
  line-height: 1.7;
}
.upload-formats { display: flex; gap: 6px; }
.fmt-tag {
  font-size: 10px; font-weight: 600;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--muted);
  color: var(--dim);
}

/* ── EDITOR ── */
#editor {
  display: none;
  flex-direction: column;
  width: 100%;
  gap: 18px;
  animation: fadeUp 0.4s ease both;
}

/* ── VIDEO PREVIEW ── */
.preview-wrap {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}
#preview-video {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}
.preview-tap {
  position: absolute; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.play-ring {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.18s;
  opacity: 0;
}
.preview-tap:hover .play-ring,
.preview-tap.playing .play-ring {
  opacity: 1;
  background: rgba(255,92,53,0.2);
  border-color: var(--cut);
}

.dur-badge {
  position: absolute;
  top: 10px; left: 12px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  border-radius: 6px;
  padding: 4px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dur-badge-time {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--gold);
}
.dur-badge-warn {
  font-size: 11px;
  color: var(--cut);
  font-weight: 500;
}
.range-badge {
  position: absolute;
  bottom: 10px; right: 12px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: rgba(242,235,224,0.75);
}

/* ── LENGTH WARNING ── */
.length-warning {
  display: none;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px; font-weight: 500;
  gap: 8px;
  align-items: center;
}
.length-warning.show-warn {
  display: flex;
  background: rgba(255,92,53,0.08);
  border: 1px solid rgba(255,92,53,0.25);
  color: var(--cut2);
}
.length-warning.show-ok {
  display: flex;
  background: rgba(74,222,128,0.07);
  border: 1px solid rgba(74,222,128,0.2);
  color: var(--green);
}

/* ── DURATION BUTTONS ── */
.section-label {
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 8px;
}
.duration-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.dur-btn {
  position: relative;
  padding: 16px 0 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--dim);
  font-family: 'Syne', sans-serif;
  font-size: 26px; font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  overflow: hidden;
}
.dur-btn .unit {
  display: block;
  font-family: 'Jost', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
}
.dur-btn.active {
  background: var(--cut-glow);
  border-color: var(--cut);
  color: var(--text);
}
.dur-btn.active .unit { color: var(--cut); }
.dur-btn.active::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--cut);
}
.dur-btn:hover:not(.active) { border-color: var(--dim); color: var(--text); }
.dur-btn.disabled-dur { opacity: 0.32; cursor: not-allowed; }

/* ── QUALITY BUTTONS ── */
.quality-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.qual-btn {
  position: relative;
  padding: 12px 8px 10px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--dim);
  font-family: 'Jost', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.qual-sub {
  font-size: 9.5px; font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.2px;
}
.qual-btn.active {
  background: var(--cut-glow);
  border-color: var(--cut);
  color: var(--text);
}
.qual-btn.active .qual-sub { color: var(--cut); }
.qual-btn.active::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--cut);
  border-radius: 12px 12px 0 0;
}
.qual-btn:hover:not(.active) { border-color: var(--dim); color: var(--text); }

/* ── TIMELINE ── */
.tl-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 7px;
}
.tl-range {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--cut);
}
.tl-total {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--dim);
}
.load-wrap {
  width: 100%; height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.load-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cut), var(--gold));
  width: 0%;
  transition: width 0.1s;
  border-radius: 2px;
}
.tl-outer {
  width: 100%; height: 76px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  background: var(--bg3);
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  transition: background 0.3s;
}
.tl-outer:active { cursor: grabbing; }
.filmstrip {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  display: flex;
  will-change: transform;
}
.frame-thumb {
  flex-shrink: 0;
  height: 76px;
  background: var(--bg3);
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.frame-loading {
  background: linear-gradient(90deg, var(--bg3) 25%, #221d14 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
body.light .frame-loading {
  background: linear-gradient(90deg, var(--bg3) 25%, #d4c9b4 50%, var(--bg3) 75%);
  background-size: 200% 100%;
}
.sel-win {
  position: absolute;
  top: 0; height: 100%;
  pointer-events: none;
  z-index: 10;
  transition: width 0.2s ease;
  border-radius: 6px;
  box-shadow: 0 0 0 9999px rgba(12,10,9,0.52);
  border: 2.5px solid var(--cut);
}
body.light .sel-win {
  box-shadow: 0 0 0 9999px rgba(250,248,244,0.58);
}
.sel-win::before {
  content: '';
  position: absolute;
  top: -1px; left: 0; right: 0;
  height: 2px;
  background: repeating-linear-gradient(
    90deg, var(--cut) 0px, var(--cut) 6px, transparent 6px, transparent 10px
  );
}
.sel-pip {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 3px; height: 26px;
  background: var(--cut);
  border-radius: 2px;
}
.sel-pip.l { left: 5px; }
.sel-pip.r { right: 5px; }

.tl-ticks {
  display: flex;
  justify-content: space-between;
  padding: 4px 2px 0;
}
.tick {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}
.drag-hint {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  transition: opacity 0.4s;
}
.drag-hint.hide { opacity: 0; }

/* ── ACTIONS ── */
.actions {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 8px;
}
.btn-prev {
  padding: 15px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-prev:hover { border-color: var(--dim); }
.btn-save {
  padding: 15px;
  background: var(--cut);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  position: relative; overflow: hidden;
}
.btn-save::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
}
.btn-save:hover { background: var(--cut2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,92,53,0.3); }
.btn-save:active { transform: translateY(0); }
.btn-save:disabled { background: var(--muted); color: var(--dim); cursor: not-allowed; transform: none; box-shadow: none; }

/* ── POST PANEL ── */
#post-panel {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 28px 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  text-align: center;
  transition: background 0.3s, border-color 0.3s;
}
.post-check {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(74,222,128,0.12);
  border: 2px solid rgba(74,222,128,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.post-title {
  font-family: 'Syne', sans-serif;
  font-size: 17px; font-weight: 700;
  color: var(--text);
}
.post-info {
  font-size: 12px;
  color: var(--dim);
  font-family: 'Space Mono', monospace;
  line-height: 1.6;
}
.post-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
}
.post-btn {
  padding: 14px 12px;
  border-radius: 11px;
  font-family: 'Jost', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.3;
}
.post-btn-again {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text);
}
.post-btn-again:hover { border-color: var(--cut); color: var(--cut); }
.post-btn-next {
  background: var(--cut);
  border: none;
  color: #fff;
}
.post-btn-next:hover { background: var(--cut2); }
.post-btn small {
  display: block;
  font-size: 10.5px; font-weight: 400;
  opacity: 0.6;
  margin-top: 2px;
}

/* ── STATUS ── */
.status-row {
  width: 100%;
  display: none;
  padding: 10px 14px;
  border-radius: 9px;
  font-size: 13px;
  gap: 9px;
  align-items: center;
}
.status-row.info    { display:flex; background:rgba(255,92,53,0.08); border:1px solid rgba(255,92,53,0.2); color:var(--cut2); }
.status-row.error   { display:flex; background:rgba(255,92,53,0.08); border:1px solid rgba(255,92,53,0.25); color:var(--cut); }

@keyframes spin { to { transform:rotate(360deg); } }
.spinner {
  width:13px; height:13px;
  border: 2px solid rgba(255,92,53,0.25);
  border-top-color: var(--cut);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
  display: inline-block;
}

/* ── FOOTER ── */
footer {
  padding: 14px 24px;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  letter-spacing: 0.5px;
  transition: border-color 0.3s, color 0.3s;
}
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo">cutcutcut<span class="cut-mark"></span></div>
    <div class="greeting" id="greeting"></div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="btn-audio" data-tip="소리 없음">🔇</button>
    <button class="icon-btn" id="btn-theme" data-tip="라이트 모드">☀️</button>
    <div class="div-v"></div>
    <button class="new-file-btn" id="new-file-btn">＋ 다른 파일</button>
  </div>
</header>

<main>

  <div id="upload-zone">
    <input type="file" id="file-input" accept="video/*">
    <div class="upload-scissors">✂️</div>
    <div class="upload-title">영상을 불러오세요</div>
    <div class="upload-desc">클릭하거나 파일을 여기로 드래그하세요<br>딱 원하는 길이로만 잘라드려요</div>
    <div class="upload-formats">
      <span class="fmt-tag">MP4</span>
      <span class="fmt-tag">MOV</span>
      <span class="fmt-tag">AVI</span>
      <span class="fmt-tag">WEBM</span>
    </div>
  </div>

  <div id="editor">

    <div class="preview-wrap">
      <video id="preview-video" playsinline muted></video>
      <div class="preview-tap" id="preview-tap">
        <div class="play-ring" id="play-ring">▶</div>
      </div>
      <div class="dur-badge">
        <span class="dur-badge-time" id="dur-badge-time">0.0초</span>

<footer>CutCutCut · 정확한 길이로, 딱 잘라요</footer>

<script>
// ── 인사말 ─────────────────────────────────────────────────
const GREETINGS = [
  "일요일엔 천천히, 기억은 짧게 담아요 ✂️",
  "한 주의 시작! 오늘의 순간을 잘라볼까요 🎬",
  "화요일에도 찾아와줬네요. 어떤 장면인가요? ✨",
  "한 주의 중간, 잠깐 멈추고 이 순간 남겨요 📎",
  "주말이 다가와요. 추억 하나 저장해볼까요 🌿",
  "불금! 오늘의 하이라이트를 잘라볼까요 ⚡",
  "토요일 안녕요~ 오늘은 어떤 장면을 담았나요? 🎞️",
];
document.getElementById('greeting').textContent = GREETINGS[new Date().getDay()];

// ── 상태 변수 ───────────────────────────────────────────────
let videoFile = null, videoDuration = 0, selectedDur = 1.0;
let startTime = 0, stripOffset = 0;
let isPlaying = false, playTimer = null;
let isExporting = false, hasDragged = false;
let includeAudio = false;   // 기본값: 소리 없음
let isLight = false;         // 기본값: 다크모드
let qualityMode = 'youtube'; // 기본값: 유튜브 화질

const QUALITY_PRESETS = {
  sns:     { video: 8_000_000,  audio: 128_000 },
  youtube: { video: 25_000_000, audio: 192_000 },
  max:     { video: 80_000_000, audio: 320_000 },
};

const PX_PER_SEC = 90, THUMB_COUNT = 22;

// ── DOM ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const uploadZone  = $('upload-zone');
const fileInput   = $('file-input');
const editor      = $('editor');
const video       = $('preview-video');
const previewTap  = $('preview-tap');
const playRing    = $('play-ring');
const filmstrip   = $('filmstrip');
const tlOuter     = $('tl-outer');
const selWin      = $('sel-win');
const loadFill    = $('load-fill');
const tlRange     = $('tl-range');
const tlTotal     = $('tl-total');
const tlTicks     = $('tl-ticks');
const rangeBadge  = $('range-badge');
const durBadgeTime= $('dur-badge-time');
const durBadgeWarn= $('dur-badge-warn');
const lenWarn     = $('length-warning');
const statusRow   = $('status-row');
const sIcon       = $('s-icon');
const sText       = $('s-text');
const btnPrev     = $('btn-prev');
const btnSave     = $('btn-save');
const postPanel   = $('post-panel');
const postInfo    = $('post-info');
const btnAgain    = $('btn-again');
const btnNext     = $('btn-next');
const newFileBtn  = $('new-file-btn');
const dragHint    = $('drag-hint');
const actionsEl   = $('actions');
const btnAudio    = $('btn-audio');
const btnTheme    = $('btn-theme');

// ── 테마 토글 ───────────────────────────────────────────────
btnTheme.addEventListener('click', () => {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  btnTheme.textContent   = isLight ? '🌙' : '☀️';
  btnTheme.dataset.tip   = isLight ? '다크 모드' : '라이트 모드';
  btnTheme.classList.toggle('on', isLight);
});

// ── 소리 토글 ───────────────────────────────────────────────
btnAudio.addEventListener('click', () => {
  includeAudio = !includeAudio;
  btnAudio.textContent = includeAudio ? '🔊' : '🔇';
  btnAudio.dataset.tip  = includeAudio ? '소리 포함' : '소리 없음';
  btnAudio.classList.toggle('on', includeAudio);
  video.muted = !includeAudio;  // 미리보기 소리도 동기화
});

// ── 화질 버튼 ───────────────────────────────────────────────
document.querySelectorAll('.qual-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.qual-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    qualityMode = btn.dataset.q;
  });
});

// ── 업로드 ─────────────────────────────────────────────────
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadVideo(e.target.files[0]); });
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadVideo(f);
});
newFileBtn.addEventListener('click', () => { fileInput.value = ''; fileInput.click(); });

// ── 클립 길이 ──────────────────────────────────────────────
document.querySelectorAll('.dur-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('disabled-dur')) return;
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDur = parseFloat(btn.dataset.dur);
    updateSelWin(); clampStrip(); applyStrip();
    startTime = calcStartTime();
    updateTimeUI(); checkLengthWarning();
  });
});

// ── 영상 불러오기 ───────────────────────────────────────────
async function loadVideo(file) {
  stopPreview();
  videoFile = file;
  stripOffset = 0; startTime = 0; hasDragged = false;
  filmstrip.innerHTML = ''; tlTicks.innerHTML = '';
  hideStatus(); hidePostPanel();
  actionsEl.style.display = '';

  video.src = URL.createObjectURL(file);
  video.muted = !includeAudio;
  video.load();

  uploadZone.style.display = 'none';
  editor.style.display = 'flex';
  newFileBtn.style.display = 'block';
  dragHint.classList.remove('hide');

  await new Promise(res => video.addEventListener('loadedmetadata', res, {once:true}));
  videoDuration = video.duration;
  tlTotal.textContent = `전체 ${videoDuration.toFixed(1)}초`;
  durBadgeTime.textContent = `${videoDuration.toFixed(1)}초`;

  checkLengthWarning();
  buildPlaceholders();
  updateSelWin();
  updateTimeUI();
  buildTicks();
  await extractFrames(file);
}

// ── 길이 경고 ───────────────────────────────────────────────
function checkLengthWarning() {
  if (!videoDuration) return;
  document.querySelectorAll('.dur-btn').forEach(btn => {
    btn.classList.toggle('disabled-dur', videoDuration < parseFloat(btn.dataset.dur));
  });
  if (videoDuration < selectedDur) {
    const p = [1, 1.5, 2].find(d => d <= videoDuration);
    if (p) {
      selectedDur = p;
      document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
      const t = document.querySelector(`.dur-btn[data-dur="${p}"]`);
      if (t) t.classList.add('active');
    }
  }
  const rem = videoDuration - selectedDur;
  if (videoDuration < 1) {
    lenWarn.className = 'length-warning show-warn';
    lenWarn.textContent = `⚠ 이 영상은 ${videoDuration.toFixed(1)}초로 너무 짧아요. 최소 1초 이상 필요해요.`;
    btnSave.disabled = true;
    durBadgeWarn.textContent = '짧음';
  } else if (rem < 0.5) {
    lenWarn.className = 'length-warning show-warn';
    lenWarn.textContent = `⚠ 이 영상은 ${videoDuration.toFixed(1)}초예요. ${selectedDur}초 클립으로 조정 범위가 거의 없어요.`;
    btnSave.disabled = false; durBadgeWarn.textContent = '';
  } else {
    lenWarn.className = 'length-warning show-ok';
    lenWarn.textContent = `✓ ${videoDuration.toFixed(1)}초 영상 — ${selectedDur}초 클립으로 ${Math.floor(rem*10)/10}초 조정 가능해요.`;
    btnSave.disabled = false; durBadgeWarn.textContent = '';
  }
}

// ── 필름스트립 ──────────────────────────────────────────────
function buildPlaceholders() {
  filmstrip.innerHTML = '';
  const totalPx = Math.max(videoDuration * PX_PER_SEC, tlOuter.offsetWidth);
  filmstrip.style.width = totalPx + 'px';
  const tw = totalPx / THUMB_COUNT;
  for (let i = 0; i < THUMB_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'frame-thumb frame-loading';
    d.style.width = tw + 'px';
    d.id = `th-${i}`;
    filmstrip.appendChild(d);
  }
}

async function extractFrames(file) {
  // iOS Safari는 DOM에 붙어있고 사용자 제스처가 있어야 canvas 드로잉 가능
  // → 별도 video 대신 메인 video 요소를 임시로 활용
  const ov = document.createElement('video');
  ov.muted = true;
  ov.playsInline = true;
  ov.setAttribute('playsinline', '');
  ov.setAttribute('webkit-playsinline', '');
  ov.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;';
  document.body.appendChild(ov);  // DOM에 붙여야 iOS에서 seek 허용

  ov.src = URL.createObjectURL(file);
  await new Promise(res => {
    ov.addEventListener('loadeddata', res, {once:true});
    ov.addEventListener('loadedmetadata', res, {once:true});
    setTimeout(res, 4000);
    ov.load();
  });

  // iOS: 한 번 재생해야 seek + canvas 드로잉이 풀림
  try {
    await ov.play();
    await new Promise(res => setTimeout(res, 80));
    ov.pause();
    ov.currentTime = 0;
    await new Promise(res => { ov.addEventListener('seeked', res, {once:true}); setTimeout(res,500); });
  } catch(e) {}

  const dur = (isFinite(ov.duration) && ov.duration > 0) ? ov.duration : videoDuration;
  const totalPx = Math.max(dur * PX_PER_SEC, tlOuter.offsetWidth);
  const tw = totalPx / THUMB_COUNT;

  for (let i = 0; i < THUMB_COUNT; i++) {
    const t = (i / THUMB_COUNT) * dur;
    ov.currentTime = t;
    await new Promise(res => {
      const h = () => { ov.removeEventListener('seeked', h); res(); };
      ov.addEventListener('seeked', h);
      setTimeout(res, 1200);
    });
    try {
      const c = document.createElement('canvas');
      c.width = Math.ceil(tw); c.height = 76;
      const ctx = c.getContext('2d');
      ctx.drawImage(ov, 0, 0, c.width, 76);
      // iOS는 빈 캔버스(검정)를 그릴 수 있음 — 픽셀 데이터로 확인
      const px = ctx.getImageData(0, 0, 4, 4).data;
      const hasPixel = px.some(v => v > 0);
      if (hasPixel) {
        c.style.cssText = `width:${tw}px;min-width:${tw}px;height:76px;display:block;flex-shrink:0;`;
        const pl = document.getElementById(`th-${i}`);
        if (pl) pl.replaceWith(c);
      }
    } catch(e) {}
    loadFill.style.width = ((i+1)/THUMB_COUNT*100) + '%';
    await new Promise(res => setTimeout(res, 10));
  }
  loadFill.style.width = '0%';
  document.body.removeChild(ov);
  URL.revokeObjectURL(ov.src);
}

// ── 선택 창 ─────────────────────────────────────────────────
function updateSelWin() {
  const ow = tlOuter.offsetWidth;
  const sw = Math.min(selectedDur * PX_PER_SEC, ow * 0.85);
  selWin.style.left  = ((ow - sw) / 2) + 'px';
  selWin.style.width = sw + 'px';
}
function calcStartTime() {
  const ow = tlOuter.offsetWidth;
  const sw = Math.min(selectedDur * PX_PER_SEC, ow * 0.85);
  const sl = (ow - sw) / 2;
  return Math.max(0, Math.min((sl - stripOffset) / PX_PER_SEC, videoDuration - selectedDur));
}
function clampStrip() {
  const ow = tlOuter.offsetWidth;
  const sw = Math.min(selectedDur * PX_PER_SEC, ow * 0.85);
  const sl = (ow - sw) / 2;
  stripOffset = Math.max(sl - Math.max(0, videoDuration - selectedDur) * PX_PER_SEC, Math.min(sl, stripOffset));
}
function applyStrip() { filmstrip.style.transform = `translateX(${stripOffset}px)`; }
function updateTimeUI() {
  const f = t => t.toFixed(2);
  tlRange.textContent = `${f(startTime)} — ${f(startTime + selectedDur)}`;
  rangeBadge.textContent = `${f(startTime)}s ~ ${f(startTime + selectedDur)}s`;
}

// ── 드래그 ─────────────────────────────────────────────────
let isDrag = false, dragX0 = 0, stripOff0 = 0;
tlOuter.addEventListener('mousedown',  e => { isDrag=true; dragX0=e.clientX; stripOff0=stripOffset; });
tlOuter.addEventListener('touchstart', e => { e.preventDefault(); isDrag=true; dragX0=e.touches[0].clientX; stripOff0=stripOffset; }, {passive:false});
document.addEventListener('mousemove', e => { if(isDrag) moveDrag(e.clientX); });
tlOuter.addEventListener('touchmove',  e => { if(isDrag){ e.preventDefault(); moveDrag(e.touches[0].clientX); } }, {passive:false});
document.addEventListener('mouseup',  () => isDrag=false);
document.addEventListener('touchend', () => isDrag=false);
function moveDrag(x) {
  stripOffset = stripOff0 + (x - dragX0);
  clampStrip(); applyStrip();
  startTime = calcStartTime();
  updateTimeUI();
  video.currentTime = startTime;
  if (!hasDragged) { hasDragged=true; dragHint.classList.add('hide'); }
}

// ── 눈금 ────────────────────────────────────────────────────
function buildTicks() {
  tlTicks.innerHTML = '';
  const iv = videoDuration<=5?1:videoDuration<=15?2:videoDuration<=60?5:10;
  for (let t=0; t<=videoDuration; t+=iv) {
    const d = document.createElement('div');
    d.className = 'tick';
    d.textContent = t>=60 ? `${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}` : `${t}s`;
    tlTicks.appendChild(d);
  }
}

// ── 미리보기 ────────────────────────────────────────────────
previewTap.addEventListener('click', toggle);
btnPrev.addEventListener('click', toggle);
function toggle() { isPlaying ? stopPreview() : startPreview(); }
function startPreview() {
  if (!videoFile || isExporting) return;
  stopPreview(); isPlaying = true;
  playRing.textContent = '⏹';
  previewTap.classList.add('playing');
  btnPrev.textContent = '⏹ 정지';
  video.muted = !includeAudio;
  video.currentTime = startTime;
  video.play();
  playTimer = setTimeout(stopPreview, selectedDur * 1000 + 60);
}
function stopPreview() {
  clearTimeout(playTimer); isPlaying = false;
  video.pause();
  playRing.textContent = '▶';
  previewTap.classList.remove('playing');
  btnPrev.textContent = '▶ 미리보기';
}
video.addEventListener('ended', stopPreview);

// ── 저장 ─────────────────────────────────────────────────────
// iOS Safari  → canvas + requestAnimationFrame (프레임 완벽 동기)
// Android/PC  → video.captureStream() + MediaRecorder

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

// 저장 전 미리 seek해두기 (버튼 반응 빠르게)
function prewarm() {
  if (!videoFile || isPlaying) return;
  video.currentTime = startTime;
}
tlOuter.addEventListener('touchend', () => setTimeout(prewarm, 200));
document.querySelectorAll('.dur-btn').forEach(b => b.addEventListener('click', prewarm));

btnSave.addEventListener('click', doExport);
async function doExport() {
  if (!videoFile || isExporting || btnSave.disabled) return;
  stopPreview();
  if (!window.MediaRecorder) {
    showStatus('error', '최신 Safari 또는 Chrome을 사용해 주세요.');
    return;
  }
  isExporting = true; btnSave.disabled = true;
  showStatus('info', null, `✂ ${startTime.toFixed(2)}s ~ ${(startTime+selectedDur).toFixed(2)}s 저장 중...`);
  try {
    if (isIOS()) {
      await exportCanvas();
    } else {
      await exportCapture();
    }
  } catch(err) {
    console.error(err);
    loadFill.style.width = '0%';
    showStatus('error', `저장 실패: ${err.message || '다시 시도해주세요.'}`);
  } finally {
    isExporting = false; btnSave.disabled = false;
  }
}

/* ── iOS: canvas + requestAnimationFrame (버벅임 없음) ── */
function exportCanvas() {
  return new Promise((resolve, reject) => {
    const W = video.videoWidth || 1280, H = video.videoHeight || 720;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    let stream;
    try { stream = canvas.captureStream(30); } catch(e) { return reject(e); }

    // iOS Safari가 지원하는 코덱 순서대로
    const mimes = ['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp8','video/webm'];
    const mime = mimes.find(t => { try { return MediaRecorder.isTypeSupported(t); } catch(_){return false;} }) || '';
    const ext  = mime.includes('mp4') ? 'mp4' : 'webm';

    let rec;
    try { rec = new MediaRecorder(stream, mime ? {mimeType: mime, videoBitsPerSecond: 8_000_000} : {}); }
    catch(e) { return reject(e); }

    const chunks = [];
    let rafId = null, recStarted = false;
    const endAt = startTime + selectedDur;

    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    rec.onstop = () => {
      if (rafId) cancelAnimationFrame(rafId);
      loadFill.style.width = '0%';
      video.pause();
      downloadBlob(new Blob(chunks, {type: mime || 'video/mp4'}),
        `cutcutcut_${startTime.toFixed(2)}s-${selectedDur}s.${ext}`);
      hideStatus(); showPostPanel(ext); resolve();
    };
    rec.onerror = e => reject(e.error || e);

    function drawLoop() {
      const ct = video.currentTime;
      ctx.drawImage(video, 0, 0, W, H);
      const progress = Math.min((ct - startTime) / selectedDur, 1);
      loadFill.style.width = (progress * 100) + '%';

      if (ct >= endAt - 0.04 || video.ended) {
        rec.stop();
        return;
      }
      rafId = requestAnimationFrame(drawLoop);
    }

    // 이미 seek 됐으면 바로 시작, 아니면 seek 후 시작
    const doStart = () => {
      video.muted = !includeAudio;
      rec.start(200);
      recStarted = true;
      video.play().catch(reject);
      rafId = requestAnimationFrame(drawLoop);
    };

    if (Math.abs(video.currentTime - startTime) < 0.1) {
      doStart();
    } else {
      video.currentTime = startTime;
      video.addEventListener('seeked', doStart, {once: true});
    }
  });
}

/* ── Android / Desktop: 원본 해상도 숨김 영상 + 고비트레이트 ── */
function exportCapture() {
  return new Promise((resolve, reject) => {
    const preset = QUALITY_PRESETS[qualityMode];

    // 원본 해상도 캡처용 숨김 영상 (미리보기 창 크기 제약 없음)
    const capVideo = document.createElement('video');
    capVideo.src = URL.createObjectURL(videoFile);
    capVideo.muted = !includeAudio;
    capVideo.playsInline = true;
    capVideo.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(capVideo);

    capVideo.addEventListener('loadedmetadata', function() {
      const doRecord = () => {
        let stream;
        try { stream = capVideo.captureStream ? capVideo.captureStream() : capVideo.mozCaptureStream(); }
        catch(e) { document.body.removeChild(capVideo); return reject(e); }

        const tracks = includeAudio
          ? [...stream.getVideoTracks(), ...stream.getAudioTracks()]
          : stream.getVideoTracks();

        const mimes = ['video/mp4;codecs=h264,aac','video/mp4;codecs=avc1','video/mp4',
                       'video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
        const mime = mimes.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
        const ext  = mime.includes('mp4') ? 'mp4' : 'webm';

        const recOpts = {
          mimeType: mime,
          videoBitsPerSecond: preset.video,
          ...(includeAudio && { audioBitsPerSecond: preset.audio }),
        };

        let rec;
        try { rec = new MediaRecorder(new MediaStream(tracks), recOpts); }
        catch(e) { rec = new MediaRecorder(new MediaStream(tracks), { mimeType: mime }); }

        const chunks = [];
        rec.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        rec.onstop = () => {
          document.body.removeChild(capVideo);
          loadFill.style.width = '0%';
          downloadBlob(new Blob(chunks, {type: mime}), `cutcutcut_${startTime.toFixed(2)}s-${selectedDur}s.${ext}`);
          hideStatus(); showPostPanel(ext); resolve();
        };
        rec.onerror = e => { document.body.removeChild(capVideo); reject(e.error || e); };

        let elapsed = 0;
        const iv = setInterval(() => {
          elapsed += 0.1;
          loadFill.style.width = Math.min(elapsed / selectedDur * 100, 100) + '%';
        }, 100);

        rec.start(100);
        capVideo.play();
        setTimeout(() => { clearInterval(iv); rec.stop(); capVideo.pause(); }, selectedDur * 1000 + 150);
      };

      capVideo.currentTime = startTime;
      if (Math.abs(capVideo.currentTime - startTime) < 0.1) {
        doRecord();
      } else {
        capVideo.addEventListener('seeked', doRecord, {once: true});
      }
    }, {once: true});
  });
}

function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

// ── 저장 후 패널 ─────────────────────────────────────────────
function showPostPanel(ext) {
  const end = (startTime+selectedDur).toFixed(2);
  const qLabel = { sns:'📱 SNS', youtube:'🎬 YouTube', max:'💎 최대' }[qualityMode];
  postInfo.textContent =
    `${startTime.toFixed(2)}s ~ ${end}s · ${selectedDur}초 · ${ext.toUpperCase()} · ${qLabel} · ${includeAudio?'🔊 소리 포함':'🔇 무음'}`;
  postPanel.style.display = 'flex';
  actionsEl.style.display = 'none';
}
function hidePostPanel() { postPanel.style.display='none'; actionsEl.style.display=''; }

btnAgain.addEventListener('click', () => {
  hidePostPanel(); hideStatus();
  video.currentTime=0; stripOffset=0; startTime=0; hasDragged=false;
  dragHint.classList.remove('hide');
  updateSelWin(); clampStrip(); applyStrip(); updateTimeUI();
});
btnNext.addEventListener('click', () => { fileInput.value=''; fileInput.click(); });

// ── 상태 표시 ────────────────────────────────────────────────
function showStatus(type, icon, text) {
  statusRow.className = `status-row ${type}`;
  if (type==='info'&&!icon) { sIcon.innerHTML='<span class="spinner"></span>'; sText.textContent=text; }
  else { sIcon.textContent=icon||''; sText.textContent=text||icon||''; }
}
function hideStatus() { statusRow.className='status-row'; }

window.addEventListener('resize', () => { if(videoFile){ updateSelWin(); clampStrip(); applyStrip(); } });
setTimeout(updateSelWin, 100);
</script>
